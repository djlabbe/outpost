name: Daily Stock Scan

on:
  schedule:
    # 21:30 UTC = 4:30pm Eastern on non-DST days, ~5:30pm during EDT.
    # Runs after the US market close on weekdays. Adjust the hour if you
    # want it earlier/later — GitHub Actions cron is always UTC.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update scan results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
